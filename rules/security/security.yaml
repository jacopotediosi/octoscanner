# OctoPrint security rules

# TODO:
# - Plugin implements APIs `SimpleApi`/`BlueprintPlugin` without `Permissions` checks (?)
# - Pnotify XSS (?)
# - Plugin implements custom route defined by `route_hook` w/o authentication (?)
# - `{{var}}` without sanitization in jinja templates (?)
# - Ensure all rules have a `since` attribute

rules:
  - id: SEC-0001
    message: >
      Plugin implements `SimpleApiPlugin` but does not override `is_api_protected()`.
      Until OctoPrint 2.1.0, the default implementation returns `False`, allowing
      unauthenticated access to `SimpleApi` endpoints.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.SimpleApiPlugin, ...):
                  ...
          - pattern: |
              class $CLASS(..., SimpleApiPlugin, ...):
                  ...
      - pattern-not: |
          class $CLASS(...):
              ...
              def is_api_protected(self, ...):
                  ...
              ...
    metadata:
      type: security
      since: 1.11.2
      suggestion: >
        Override `is_api_protected()` to explicitly return `True`. Note that this only
        controls authentication; you should also verify permissions explicitly in
        each API handler (e.g. `Permissions.PLUGIN_MYPLUGIN_ACCESS`).
  - id: SEC-0002
    message: >
      Plugin implements `is_api_protected()` but explicitly returns `False`, leaving
      `SimpleApi` endpoints accessible without authentication.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.SimpleApiPlugin, ...):
                  ...
                  def is_api_protected(self, ...):
                      ...
                      return False
                  ...
          - pattern: |
              class $CLASS(..., SimpleApiPlugin, ...):
                  ...
                  def is_api_protected(self, ...):
                      ...
                      return False
                  ...
    metadata:
      type: security
      since: 1.11.2
      suggestion: >
        Ensure this is intentional. Consider returning `True` and adding explicit
        permission checks in each API handler.
  - id: SEC-0003
    message: >
      Plugin implements `is_blueprint_protected()` but explicitly returns `False`,
      leaving the blueprint's dynamic endpoints accessible without authentication.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.BlueprintPlugin, ...):
                  ...
                  def is_blueprint_protected(self, ...):
                      ...
                      return False
                  ...
          - pattern: |
              class $CLASS(..., BlueprintPlugin, ...):
                  ...
                  def is_blueprint_protected(self, ...):
                      ...
                      return False
                  ...
    metadata:
      type: security
      since: 1.2.0
      suggestion: >
        Ensure this is intentional. Consider returning `True` and adding explicit
        permission checks in each endpoint handler (e.g. `Permissions.PLUGIN_MYPLUGIN_ACCESS`).
  - id: SEC-0004
    message: >
      Plugin implements `BlueprintPlugin` but does not override
      `is_blueprint_csrf_protected()`. Until OctoPrint 2.0.0, the default
      implementation returns `False`, leaving the blueprint's endpoints
      exposed to CSRF attacks.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.BlueprintPlugin, ...):
                  ...
          - pattern: |
              class $CLASS(..., BlueprintPlugin, ...):
                  ...
      - pattern-not: |
          class $CLASS(...):
              ...
              def is_blueprint_csrf_protected(self, ...):
                  ...
              ...
    metadata:
      type: security
      since: 1.8.3
      suggestion: >
        Override `is_blueprint_csrf_protected()` to return `True` and exempt only
        the endpoints that must not use CSRF protection via the
        `@octoprint.plugin.BlueprintPlugin.csrf_exempt()` decorator.
  - id: SEC-0005
    message: >
      Plugin implements `is_blueprint_csrf_protected()` but explicitly returns
      `False`, leaving the blueprint's endpoints exposed to CSRF attacks.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.BlueprintPlugin, ...):
                  ...
                  def is_blueprint_csrf_protected(self, ...):
                      ...
                      return False
                  ...
          - pattern: |
              class $CLASS(..., BlueprintPlugin, ...):
                  ...
                  def is_blueprint_csrf_protected(self, ...):
                      ...
                      return False
                  ...
    metadata:
      type: security
      since: 1.8.3
      suggestion: >
        Return `True` and exempt only the endpoints that genuinely cannot use CSRF
        protection via the `@octoprint.plugin.BlueprintPlugin.csrf_exempt()` decorator.
  - id: SEC-0006
    message: >
      Endpoint exempted from CSRF protection via `BlueprintPlugin.csrf_exempt()`.
      Ensure that the exemption is necessary and that the endpoint uses an
      alternative anti-CSRF mechanism (e.g. token in header).
    languages: [python]
    severity: CRITICAL
    pattern-either:
      - pattern: "@octoprint.plugin.BlueprintPlugin.csrf_exempt()"
      - pattern: "@BlueprintPlugin.csrf_exempt()"
    metadata:
      type: security
      since: 1.8.3
      suggestion: >
        Remove the decorator if not strictly required. Otherwise, document why
        the endpoint cannot use CSRF protection and ensure another anti-CSRF
        mechanism is in place.
  - id: SEC-0007
    message: >
      Plugin implements `TemplatePlugin` but does not override
      `is_template_autoescaped()`. Until OctoPrint 2.1.0, the default
      implementation returns `False`, exposing the templates to XSS via
      unescaped variables.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.TemplatePlugin, ...):
                  ...
          - pattern: |
              class $CLASS(..., TemplatePlugin, ...):
                  ...
      - pattern-not: |
          class $CLASS(...):
              ...
              def is_template_autoescaped(self, ...):
                  ...
              ...
    metadata:
      type: security
      since: 1.11.0
      suggestion: >
        Override `is_template_autoescaped()` to return `True` and use the `safe`
        Jinja filter only for variables that legitimately need to render HTML.
        See https://faq.octoprint.org/plugin-autoescape.
  - id: SEC-0008
    message: >
      Plugin implements `is_template_autoescaped()` but explicitly returns
      `False`, exposing the templates to XSS via unescaped variables.
    languages: [python]
    severity: CRITICAL
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS(..., octoprint.plugin.TemplatePlugin, ...):
                  ...
                  def is_template_autoescaped(self, ...):
                      ...
                      return False
                  ...
          - pattern: |
              class $CLASS(..., TemplatePlugin, ...):
                  ...
                  def is_template_autoescaped(self, ...):
                      ...
                      return False
                  ...
    metadata:
      type: security
      since: 1.11.0
      suggestion: >
        Return `True` and use the `safe` Jinja filter only for variables that
        legitimately need to render HTML. See https://faq.octoprint.org/plugin-autoescape.
  - id: SEC-0009
    message: >
      Knockout `html:` binding bound to a non-literal value in a Jinja/HTML
      template. The bound expression is rendered as raw HTML, so any
      attacker-controllable data flowing into it results in DOM XSS.
    languages: [generic]
    severity: WARNING
    paths:
      include:
        - "*.jinja2"
        - "*.html"
    patterns:
      # Match the entire data-bind attribute (double- or single-quoted) that
      # contains an `html:` binding. Capturing the whole attribute lets the
      # `pattern-not-regex` filters below inspect the actual bound value.
      - pattern-either:
          - pattern-regex: 'data-bind\s*=\s*"[^"]*\bhtml\s*:[^"]*"'
          - pattern-regex: "data-bind\\s*=\\s*'[^']*\\bhtml\\s*:[^']*'"
      # Exclude Bootstrap popover sub-option `html: true|false`.
      - pattern-not-regex: '\bhtml\s*:\s*(true|false)\b'
      # Exclude `html: '<literal>'` / `html: "<literal>"` (terminator: comma,
      # closing brace, or end-of-attribute quote).
      - pattern-not-regex: '\bhtml\s*:\s*"[^"]*"\s*[,}]'
      - pattern-not-regex: "\\bhtml\\s*:\\s*'[^']*'\\s*[,}]"
      - pattern-not-regex: '\bhtml\s*:\s*"[^"]*"\s*$'
      - pattern-not-regex: "\\bhtml\\s*:\\s*'[^']*'\\s*$"
      # Exclude `html: gettext('...')` / `html: _('...')` with a literal arg.
      - pattern-not-regex: '\bhtml\s*:\s*(gettext|_)\(\s*[''"][^''"]*[''"]\s*\)'
      # Exclude any html value that pipes through an escaping/sanitizing call.
      - pattern-not-regex: '\bhtml\s*:[^,}]*\b(escape|sanitize)\s*\('
    metadata:
      type: security
      suggestion: >
        Prefer the Knockout `text:` binding, which renders the value as plain
        text and is safe by default. Use `html:` only when raw HTML output is
        strictly required, and only with values that are either fully static
        or that have been properly sanitized.
