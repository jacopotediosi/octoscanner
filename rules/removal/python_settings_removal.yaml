- id: STG-REM-0001
  message: The `accessControl.enabled` settings path has been removed in OctoPrint
    1.5.0.
  languages:
  - python
  severity: CRITICAL
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: $SELF._settings.$METHOD(["accessControl", "enabled", ...], ...)
      - pattern: $SELF.settings.$METHOD(["accessControl", "enabled", ...], ...)
      - pattern: $SELF.get_settings().$METHOD(["accessControl", "enabled", ...], ...)
      - pattern: $SELF._plugin._settings.$METHOD(["accessControl", "enabled", ...],
          ...)
    - metavariable-regex:
        metavariable: $METHOD
        regex: ^(global_get|global_get_boolean|global_get_float|global_get_int|global_has|global_remove|global_set|global_set_boolean|global_set_float|global_set_int)$
  - patterns:
    - pattern-either:
      - pattern: $SELF._settings.settings.$METHOD(["accessControl", "enabled", ...],
          ...)
      - pattern: $SETTINGS.settings().$METHOD(["accessControl", "enabled", ...], ...)
      - pattern: settings().$METHOD(["accessControl", "enabled", ...], ...)
    - metavariable-regex:
        metavariable: $METHOD
        regex: ^(get|getBoolean|getFloat|getInt|get_boolean|get_float|get_int|has|remove|set|setBoolean|setFloat|setInt|set_boolean|set_float|set_int)$
  metadata:
    type: removal
    since: 1.5.0
    suggestion: Remove usage of settings paths under `accessControl.enabled`.
    _ref: accessControl.enabled
