# OctoPrint removal rules

rules:
- id: SIG-0001
  message: '`octoprint.plugin.core.PluginManager.is_plugin_marked` (commonly accessed
    by plugins as `self._plugin_manager.is_plugin_marked`) no longer accepts the keyword
    argument `key`.'
  languages:
  - python
  severity: HIGH
  pattern-either:
  - pattern: PluginManager.is_plugin_marked(..., key=$V, ...)
  - pattern: $X._plugin_manager.is_plugin_marked(..., key=$V, ...)
  - pattern: pluginManager.is_plugin_marked(..., key=$V, ...)
  - pattern: plugin_manager().is_plugin_marked(..., key=$V, ...)
  metadata:
    type: removal
    since: 1.5.0
    suggestion: Update the call to `octoprint.plugin.core.PluginManager.is_plugin_marked`
      (commonly accessed by plugins as `self._plugin_manager.is_plugin_marked`) to
      match its new signature.
    _removed_param: key
    _ref: octoprint.plugin.core.PluginManager.is_plugin_marked
